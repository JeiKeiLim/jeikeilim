name: Update GitHub Readme Stats

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&count_private=true&show_icons=true&theme=nord
          path: profile/github-readme-stats.svg
          token: ${{ secrets.GH_README_STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Commit card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/github-readme-stats.svg
          git diff --cached --quiet && exit 0
          git commit -m "Update GitHub readme stats card"
          git push
